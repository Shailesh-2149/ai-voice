<!DOCTYPE html>
<html>
<head>
<title>🔥 AI Voice Generator Pro</title>
<style>
body{
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}
h1{color:#38bdf8;}
input,select,button{
  padding:10px;
  margin:10px;
  border-radius:8px;
  border:none;
}
button{
  background:#38bdf8;
  color:black;
  cursor:pointer;
}
button:hover{
  background:#0ea5e9;
}
</style>
</head>

<body>

<h1>🔥 AI Voice Generator</h1>

<input id="text" placeholder="Type something..." style="width:80%"><br>

<select id="voice"></select><br>

<label>Speed:</label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1"><br>

<label>Pitch:</label>
<input type="range" id="pitch" min="0" max="2" step="0.1" value="1"><br>

<button onclick="speak()">Generate Voice</button>
<button onclick="stop()">Stop</button>

<script>
let voices = [];

function loadVoices(){
  voices = speechSynthesis.getVoices();
  let voiceSelect = document.getElementById("voice");
  voiceSelect.innerHTML = "";

  voices.forEach((v,i)=>{
    let option = document.createElement("option");
    option.value = i;
    option.text = v.name + " (" + v.lang + ")";
    voiceSelect.appendChild(option);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak(){
  let text = document.getElementById("text").value;
  let voiceIndex = document.getElementById("voice").value;
  let rate = document.getElementById("rate").value;
  let pitch = document.getElementById("pitch").value;

  let msg = new SpeechSynthesisUtterance(text);
  msg.voice = voices[voiceIndex];
  msg.rate = rate;
  msg.pitch = pitch;

  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

function stop(){
  speechSynthesis.cancel();
}
</script>

</body>
</html>
